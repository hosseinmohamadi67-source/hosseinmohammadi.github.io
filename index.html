<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>هلدینگ صداقتیون</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://v1.fontapi.ir/css/Vazir');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazir', sans-serif;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background-color: #03070b;
            color: #fff;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow-x: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right)
                     env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* background stars */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.4), transparent);
            background-size: 200px 200px;
            animation: floatingStars 100s linear infinite;
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes floatingStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .hallway {
            display: flex;
            gap: 80px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 20px;
            z-index: 10;
            transition: 0.5s;
        }

        .door-container {
            text-align: center;
            perspective: 1500px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .door-title {
            margin-bottom: 20px;
            font-size: 22px;
        }

        .door-frame {
            width: 200px;
            height: 340px;
            border: 4px solid #1a1200;
            position: relative;
            background: #000;
            border-radius: 8px;
        }

        .door {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a1200, #5c4500);
            border: 2px solid #f5c518;
            transform-origin: right;
            transition: 1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        .portal-light {
            position: absolute;
            inset: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245,197,24,0.7), transparent);
            transition: 1s;
            z-index: 1;
        }

        .door-container.active .door {
            transform: rotateY(120deg);
        }

        .door-container.active .portal-light {
            transform: translate(-50%, -50%) scale(30);
            opacity: 1;
        }

        .world {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #1a1200, #070400);
            opacity: 0;
            pointer-events: none;
            transition: 0.8s;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .world.active {
            opacity: 1;
            pointer-events: auto;
        }

        .world-content {
            position: relative;
            z-index: 2;
            background: rgba(15,10,0,0.9);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .links-grid a {
            display: flex;
            justify-content: space-between;
            padding: 14px;
            border: 1px solid #f5c518;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
        }

        .back-btn {
            padding: 10px 25px;
            border: 1px solid #f5c518;
            background: transparent;
            color: #f5c518;
            border-radius: 25px;
            cursor: pointer;
        }

        .main-footer {
            font-size: 13px;
            color: #9aafd4;
            margin-bottom: 20px;
            z-index: 10;
            transition: 0.5s;
        }

        @media (max-width: 600px) {
            .door-frame { width: 150px; height: 280px; }
            .door-title { font-size: 18px; }
        }
    </style>
</head>

<body>

<div class="hallway" id="hallway">

    <div class="door-container" onclick="enterWorld('caspian', event)">
        <h3 class="door-title">مجموعه کاسپین</h3>
        <div class="door-frame">
            <div class="portal-light"></div>
            <div class="door">ورود</div>
        </div>
    </div>

    <div class="door-container" onclick="enterWorld('cycling', event)">
        <h3 class="door-title">دوچرخه سواری کرمانشاه</h3>
        <div class="door-frame">
            <div class="portal-light"></div>
            <div class="door">ورود</div>
        </div>
    </div>

</div>

<p class="main-footer">نوشته شده با عشق توسط حسین محمدی</p>

<!-- WORLD 1 -->
<div class="world" id="world-caspian">
    <div class="world-content">
        <h2>کاسپین</h2>

        <div class="links-grid">
            <a href="https://instagram.com/caspian_bike/" target="_blank">
                <span>اینستاگرام</span>
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <button class="back-btn" onclick="exitWorld()">بازگشت</button>
    </div>
</div>

<!-- WORLD 2 -->
<div class="world" id="world-cycling">
    <div class="world-content">
        <h2>دوچرخه سواری</h2>

        <div class="links-grid">
            <a href="https://instagram.com/cycling.19/" target="_blank">
                <span>اینستاگرام</span>
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <button class="back-btn" onclick="exitWorld()">بازگشت</button>
    </div>
</div>

<script>
const hallway = document.getElementById('hallway');
const footer = document.querySelector('.main-footer');

function enterWorld(type, event) {
    const container = event.currentTarget;
    container.classList.add('active');

    setTimeout(() => {
        hallway.style.opacity = '0';
        hallway.style.pointerEvents = 'none';
        footer.style.opacity = '0';

        document.getElementById(
            type === 'caspian' ? 'world-caspian' : 'world-cycling'
        ).classList.add('active');

    }, 900);
}

function exitWorld() {
    document.querySelectorAll('.world').forEach(w => w.classList.remove('active'));
    document.querySelectorAll('.door-container').forEach(d => d.classList.remove('active'));

    setTimeout(() => {
        hallway.style.opacity = '1';
        hallway.style.pointerEvents = 'auto';
        footer.style.opacity = '1';
    }, 300);
}
</script>

</body>
</html>
